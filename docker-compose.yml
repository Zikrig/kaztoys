services:
  postgres:
    image: postgres:16-alpine
    container_name: kaztoys_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-kaztoys}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-kaztoys}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kaztoys} -d ${POSTGRES_DB:-kaztoys}"]
      interval: 5s
      timeout: 5s
      retries: 5

  bot:
    build: .
    container_name: kaztoys_bot
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-kaztoys}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-kaztoys}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
